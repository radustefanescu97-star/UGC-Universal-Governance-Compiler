<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Universal Governance Compiler</title>
  <desc id="desc">A social preview card for UGC, a local governance compiler for AI-assisted development.</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfbf6"/>
      <stop offset="1" stop-color="#eef4f1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#151718" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#paper)"/>
  <rect x="54" y="54" width="1092" height="522" rx="24" fill="#ffffff" stroke="#d9ddda" filter="url(#shadow)"/>

  <g transform="translate(92 92)">
    <rect x="0" y="0" width="88" height="66" rx="10" fill="#151718"/>
    <text x="44" y="43" text-anchor="middle" font-family="Cascadia Mono, IBM Plex Mono, SFMono-Regular, Consolas, monospace" font-size="26" font-weight="700" fill="#f7f7f2">UGC</text>
    <text x="112" y="24" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#151718">Universal Governance Compiler</text>
    <text x="112" y="53" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#5f6668">Local governance for AI-assisted development</text>
  </g>

  <g transform="translate(92 228)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="760" fill="#151718">One source.</text>
    <text x="0" y="78" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="68" font-weight="760" fill="#151718">Four outputs.</text>
    <text x="0" y="132" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" fill="#455052">Compile repository governance into deterministic rule</text>
    <text x="0" y="166" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" fill="#455052">files for Codex, Antigravity, Claude Code, and Cursor.</text>
  </g>

  <g transform="translate(92 460)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700">
    <rect x="0" y="0" width="114" height="42" rx="8" fill="#eef4f1" stroke="#cdd8d2"/>
    <text x="57" y="27" text-anchor="middle" fill="#151718">Codex</text>
    <rect x="128" y="0" width="146" height="42" rx="8" fill="#eef4f1" stroke="#cdd8d2"/>
    <text x="201" y="27" text-anchor="middle" fill="#151718">Antigravity</text>
    <rect x="288" y="0" width="154" height="42" rx="8" fill="#eef4f1" stroke="#cdd8d2"/>
    <text x="365" y="27" text-anchor="middle" fill="#151718">Claude Code</text>
    <rect x="456" y="0" width="112" height="42" rx="8" fill="#eef4f1" stroke="#cdd8d2"/>
    <text x="512" y="27" text-anchor="middle" fill="#151718">Cursor</text>
  </g>

  <g transform="translate(720 122)">
    <rect x="0" y="0" width="344" height="374" rx="18" fill="#111415"/>
    <rect x="0" y="0" width="344" height="48" rx="18" fill="#151a1b"/>
    <circle cx="28" cy="24" r="6" fill="#d24b45"/>
    <circle cx="50" cy="24" r="6" fill="#c27a1a"/>
    <circle cx="72" cy="24" r="6" fill="#4bbf7a"/>
    <text x="104" y="30" font-family="Cascadia Mono, IBM Plex Mono, SFMono-Regular, Consolas, monospace" font-size="14" fill="#cfd8d4">ugc@repo</text>

    <g font-family="Cascadia Mono, IBM Plex Mono, SFMono-Regular, Consolas, monospace" font-size="20">
      <text x="30" y="94" fill="#4bbf7a">$</text>
      <text x="58" y="94" fill="#f7f7f2">ugc init</text>
      <text x="30" y="132" fill="#6f7b7c">created governance source</text>

      <text x="30" y="184" fill="#4bbf7a">$</text>
      <text x="58" y="184" fill="#f7f7f2">ugc build</text>
      <text x="30" y="222" fill="#6f7b7c">wrote generated targets</text>

      <text x="30" y="274" fill="#4bbf7a">$</text>
      <text x="58" y="274" fill="#f7f7f2">ugc audit</text>
      <text x="30" y="312" fill="#6f7b7c">source validity: ok</text>
      <text x="30" y="348" fill="#6f7b7c">drift: none detected</text>
    </g>
  </g>

  <g transform="translate(740 526)">
    <rect x="0" y="0" width="306" height="2" fill="#d9ddda"/>
    <text x="0" y="34" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#3267d6">github.com/radustefanescu97-star</text>
  </g>
</svg>

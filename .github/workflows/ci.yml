name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    name: Test, vet, build, and smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run vet
        run: go vet ./...

      - name: Build binary
        run: go build -o /tmp/ugc-ci-bin .

      - name: Smoke test fresh UGC project
        run: |
          set -euo pipefail
          tmpdir="$(mktemp -d)"
          cd "$tmpdir"
          /tmp/ugc-ci-bin init
          /tmp/ugc-ci-bin build
          /tmp/ugc-ci-bin audit
